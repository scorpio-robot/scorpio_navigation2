loam_interface:
  ros__parameters:
    loam_odometry_topic: pslam/imu_odom
    registered_scan_topic: pslam/aligned_scan_cloud
    map_cloud_topic: pslam/lio_map_cloud
    odom_frame: odom
    base_frame: base_footprint
    lidar_frame: mid360
    robot_base_frame: base_link

lio_3d_node:
  ros__parameters:
    lidar_type: livox
    # The `use_as_localizer` and `map_cloud_dir` does not need to be specified
    # since it going to be set by defaults in launch.
    # use_as_localizer:
    # map_cloud_dir:
    param_files_dir: $(find-pkg-share scorpio_nav2_bringup)/params/reality

    pointcloud_topic: livox/lidar
    imu_topic: livox/imu

    imu_pose_topic: pslam/imu_pose
    imu_odom_topic: pslam/imu_odom
    lio_map_cloud_topic: pslam/lio_map_cloud
    aligned_scan_cloud_topic: pslam/aligned_scan_cloud
    deskewed_scan_cloud_topic: pslam/deskewed_scan_cloud

    odom_frame: pslam/odom
    imu_frame: pslam/mid360_imu
    publish_tf: False  # Whether to publish TF transform from `odom_frame` to `imu_frame`

slam_3d_node:
  ros__parameters:
    map_cloud_dir: tmp/pslam_data/
    param_files_dir: $(find-pkg-share scorpio_nav2_bringup)/params/reality

    imu_pose_topic: pslam/imu_pose
    deskewed_scan_cloud_topic: pslam/deskewed_scan_cloud
    filtered_map_cloud_topic: pslam/filtered_map_cloud
    graph_nodes_topic: pslam/pose_graph_nodes
    odom_edges_topic: pslam/pose_graph_odom_edges
    loop_edges_topic: pslam/pose_graph_loop_edges

    map_frame: pslam/map
    # odometry and imu frames are defined in lio_3d_config.yaml
    publish_tf: False  # Whether to publish TF transform from `map_frame` to `odom_frame`

slam_toolbox:
  ros__parameters:
    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /ydlidar/scan
    use_map_saver: true
    mode: mapping #localization

    # if you'd like to immediately start continuing a map at a given pose
    # or at the dock, but they are mutually exclusive, if pose is given
    # will use pose
    #map_file_name: test_steve
    #map_start_pose: [0.0, 0.0, 0.0]
    #map_start_at_dock: true

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.0 #if 0 never publishes odometry
    map_update_interval: 5.0
    resolution: 0.05
    max_laser_range: 12.0 # for rastering images
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000 #// program needs a larger stack size to serialize large maps
    enable_interactive_mode: false

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.5
    minimum_travel_heading: 0.5
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: false
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters - Correlation Parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Correlation Parameters - Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /gt/scorpio/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    default_nav_to_pose_bt_xml: $(find-pkg-share scorpio_nav2_bringup)/params/behavior_trees/nav_to_pose_with_consistent_replanning_and_if_path_becomes_invalid.xml
    default_nav_through_poses_bt_xml: $(find-pkg-share scorpio_nav2_bringup)/params/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml

    # plugin_lib_names is used to add custom BT plugins to the executor (vector of strings).
    # Built-in plugins are added automatically
    # plugin_lib_names: []

    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

